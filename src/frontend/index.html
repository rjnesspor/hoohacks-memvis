<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Memory Visualizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-raised: #21253a;
            --border: #2e3348;
            --text-primary: #e8eaf6;
            --text-secondary: #8b90a7;
            --accent: #5c6bc0;
            --accent-hover: #7986cb;
            --font: 'JetBrains Mono', 'Fira Code', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            min-height: 100vh;
        }

        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            margin-bottom: 0.1rem;
        }

        h1+p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        .row.my-3:first-of-type .col {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .file-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-group p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        input[type="file"] {
            font-family: var(--font);
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.6rem;
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button {
            display: none;
        }

        input[type="file"]::before {
            content: 'choose file';
            font-family: var(--font);
            font-size: 0.7rem;
            color: var(--accent-hover);
            margin-right: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button {
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-primary);
            background: var(--accent);
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
            transition: background 0.15s ease;
            white-space: nowrap;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .col.border {
            background: var(--surface);
            border: 1px solid var(--border) !important;
            border-radius: 8px;
            padding: 1rem;
        }

        .col.border.py-2 {
            padding-top: 0.75rem !important;
            padding-bottom: 0.75rem !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <h1>Memory Visualizer</h1>
                <p>Eric Rippey, Ryan Nesspor</p>
            </div>
        </div>

        <div class="row my-3">
            <div class="col">
                <div class="file-group">
                    <p>Trace File</p>
                    <input type="file" name="input_file" id="input_file" accept=".json">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                    <div style="display: flex; gap: 0.5rem;">
                        <button onclick="loadStuff()">Analyze</button>
                        <button onclick="reset()">Reset Graphs</button>
                    </div>
                    <button onclick="heapChart && resetGraphs()">Reset Zoom</button>
                </div>
            </div>
        </div>

        <div class="row my-3">
            <div class="col">
                <div id="info-box" style="
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            font-family: 'Courier New', monospace;
        ">
                    <div
                        style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">

                        <div style="display: flex; gap: 2.5rem; align-items: center;">
                            <div>
                                <div
                                    style="font-size: 10px; letter-spacing: 0.12em; color: #e8eaf6; text-transform: uppercase; margin-bottom: 4px;">
                                    Total Allocated</div>
                                <div id="info-total" style="font-size: 1.4rem; font-weight: 700; color: #1D9E75;">—
                                </div>
                            </div>
                            <div style="width: 1px; height: 40px; background: #2a2a2a;"></div>
                            <div>
                                <div
                                    style="font-size: 10px; letter-spacing: 0.12em; color: #e8eaf6; text-transform: uppercase; margin-bottom: 4px;">
                                    Allocation Count</div>
                                <div id="info-alloc-count" style="font-size: 1.4rem; font-weight: 700; color: #1D9E75;">
                                    —</div>
                            </div>
                        </div>

                        <div style="display: flex; gap: 2.5rem; align-items: center;">
                            <div>
                                <div
                                    style="font-size: 10px; letter-spacing: 0.12em; color: #e8eaf6; text-transform: uppercase; margin-bottom: 4px;">
                                    Total Leaked</div>
                                <div id="info-leaked" style="font-size: 1.4rem; font-weight: 700; color: #E24B4A;">—
                                </div>
                            </div>
                            <div style="width: 1px; height: 40px; background: #2a2a2a;"></div>
                            <div>
                                <div
                                    style="font-size: 10px; letter-spacing: 0.12em; color: #e8eaf6; text-transform: uppercase; margin-bottom: 4px;">
                                    Leak Count</div>
                                <div id="info-leak-count" style="font-size: 1.4rem; font-weight: 700; color: #EF9F27;">—
                                </div>
                            </div>
                            <div style="width: 1px; height: 40px; background: #2a2a2a;"></div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span
                                    style="font-size: 10px; letter-spacing: 0.12em; color: #e8eaf6; text-transform: uppercase;">Leak
                                    Mode</span>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" id="leak-mode-toggle">
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="row my-3">
            <div class="col border py-2">
                <canvas id="timeline_graph" style="display: block; width: 100%;"></canvas>
            </div>
        </div>

        <div class="row my-3">
            <div class="col border">
                <canvas id="heap_graph"></canvas>
            </div>
        </div>

        <div class="row my-3">
            <div class="col border">
                <canvas id="stack_graph"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
